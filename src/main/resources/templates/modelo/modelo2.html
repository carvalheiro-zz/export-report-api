<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <style>
        /* Configuração Nativa de Página PDF */
        @page {
            size: A4;
            margin: 4cm 1.5cm 2cm 1.5cm;
            
            @top-center {
                content: element(headerElement);
            }
            
            @bottom-left {
                content: "{{tituloRelatorio}} | {{nomeSistema}}";
                font-family: sans-serif;
                font-size: 9pt;
            }
            
            @bottom-right {
                content: "Página " counter(page) " de " counter(pages);
                font-family: sans-serif;
                font-size: 9pt;
            }
        }

        /* Elemento de Cabeçalho (Repete em todas as páginas) */
        #header {
            position: running(headerElement);
            width: 100%;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
        }

        .header-table { width: 100%; border-collapse: collapse; }
        .header-table td { vertical-align: middle; border: none; }

        .logo { width: 120px; height: auto; }
        .titulo-central {
            text-align: center;
            font-size: 18pt;
            font-weight: bold;
            color: #0056b3;
        }

        body {
            font-family: sans-serif;
            font-size: 11pt;
            color: #333;
            margin: 0;
        }

        .data-hora {
            font-size: 8pt;
            text-align: right;
            margin-bottom: 10px;
        }

        .etapa-container {
            margin-top: 20px;
            page-break-inside: avoid;
        }

        .etapa-titulo {
            background-color: #f4f4f4;
            padding: 8px;
            border-left: 5px solid #0056b3;
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background-color: #eee;
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <div id="header">
        <table class="header-table">
            <tr>
                <td style="width: 25%;">
                    <img src="https://picsum.photos/200/80" class="logo" alt="Logo" />
                </td>
                <td style="width: 50%;" class="titulo-central">
                    {{tituloRelatorio}}
                </td>
                <td style="width: 25%;"></td>
            </tr>
        </table>
    </div>

    <div class="data-hora">
        Gerado em: {{dataHora}}
    </div>

    {{#each etapas}}
    <div class="etapa-container">
        <div class="etapa-titulo">{{nomeEtapa}}</div>
        <table>
            <thead>
                <tr>
                    <th style="width: 40%;">Mandante</th>
                    <th style="width: 20%; text-align: center;">VS</th>
                    <th style="width: 40%; text-align: right;">Visitante</th>
                </tr>
            </thead>
            <tbody>
                {{#each confrontos}}
                <tr>
                    <td>{{time1.nome}} ({{time1.pontos}} pts)</td>
                    <td style="text-align: center;">x</td>
                    <td style="text-align: right;">({{time2.pontos}} pts) {{time2.nome}}</td>
                </tr>
                {{/each}}
            </tbody>
        </table>
    </div>
    {{/each}}

</body>
</html>
