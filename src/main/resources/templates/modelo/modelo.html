<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <style>
        /* Estilo padrão sem regras de @page */
        body {
            font-family: sans-serif;
            font-size: 11pt;
            color: #333;
            margin: 20px; /* Margem simples de visualização */
        }

        /* Cabeçalho simples (não fixo) */
        .header-container {
            width: 100%;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: table; /* Para alinhar logo e título lado a lado */
        }

        .logo-box {
            display: table-cell;
            vertical-align: middle;
            width: 150px;
        }

        .logo {
            width: 120px;
            height: auto;
        }

        .titulo-box {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }

        .titulo-central {
            font-size: 20pt;
            font-weight: bold;
            color: #0056b3;
            margin: 0;
        }

        .data-hora {
            font-size: 9pt;
            text-align: right;
            color: #666;
            margin-bottom: 20px;
        }

        /* Estrutura das Etapas */
        .etapa-container {
            margin-bottom: 30px;
        }

        .etapa-titulo {
            background-color: #f4f4f4;
            padding: 10px;
            border-left: 5px solid #0056b3;
            font-weight: bold;
            font-size: 13pt;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #eee;
            text-align: left;
            padding: 10px;
            border-bottom: 2px solid #333;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        .pontos {
            color: #666;
            font-size: 9pt;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-box">
            <img src="https://picsum.photos/200/80" class="logo" alt="Logo" />
        </div>
        <div class="titulo-box">
            <h1 class="titulo-central">{{tituloRelatorio}}</h1>
        </div>
    </div>

    <div class="data-hora">
        Relatório gerado pelo sistema: {{nomeSistema}}<br />
        Data: {{dataHora}}
    </div>

    {{#each etapas}}
    <div class="etapa-container">
        <div class="etapa-titulo">{{nomeEtapa}}</div>
        <table>
            <thead>
                <tr>
                    <th style="width: 45%;">Mandante</th>
                    <th style="width: 10%; text-align: center;">VS</th>
                    <th style="width: 45%; text-align: right;">Visitante</th>
                </tr>
            </thead>
            <tbody>
                {{#each confrontos}}
                <tr>
                    <td>
                        <strong>{{time1.nome}}</strong> 
                        <span class="pontos">({{time1.pontos}} pts)</span>
                    </td>
                    <td style="text-align: center; font-weight: bold;">x</td>
                    <td style="text-align: right;">
                        <span class="pontos">({{time2.pontos}} pts)</span> 
                        <strong>{{time2.nome}}</strong>
                    </td>
                </tr>
                {{/each}}
            </tbody>
        </table>
    </div>
    {{/each}}

</body>
</html>
