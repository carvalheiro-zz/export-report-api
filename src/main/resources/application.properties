# PERMITE O ACESSO AOS VALORES DEFINIDOS NO ARQUIVOS PROPERTIES LOCAIS
spring.config.import=database.properties,logs.properties

spring.application.name=export-report-api

# O Render injeta a porta na variavel de ambiente PORT
server.port=${PORT:8080}
# Otimizacao para Spring Boot 3+ em ambientes com pouca memoria
#spring.main.lazy-initialization=true

# Habilita Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# Configuracao de Upload para arquivos grandes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Habilita o Swagger UI
springdoc.swagger-ui.enabled=true

# Caminho para a interface visual (Swagger UI)
springdoc.swagger-ui.path=/swagger-ui.html

# Caminho para o JSON da especificacao (OpenAPI)
springdoc.api-docs.path=/api-docs

# Mantem a ordenacao dos metodos por ordem alfabetica
springdoc.swagger-ui.operations-sorter=alpha
