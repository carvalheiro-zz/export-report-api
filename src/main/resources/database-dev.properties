# Configuraçăo de Fonte de Dados - H2
spring.datasource.url=jdbc:h2:file:./data/export-report_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitaçăo do Console Web para inspeçăo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuraçăo JPA / Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# Permite que o H2 seja exibido em frames (necessário para o console funcionar)
# Sem o Spring Security, o Spring Boot 3.4 pode exigir esta configuraçăo manual em alguns ambientes
server.servlet.session.cookie.same-site=strict